# ============================================
# InfoOly Track - Nginx 反向代理配置
# 放置路径：/etc/nginx/sites-available/info-oly-track
# 启用方式：ln -s /etc/nginx/sites-available/info-oly-track /etc/nginx/sites-enabled/
# ============================================

# 上游 Next.js 应用
upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    # TODO: 替换为你的实际域名
    server_name _;

    # 真实 IP 转发（支持多级代理）
    set_real_ip_from 127.0.0.1;
    # 如果部署在 CDN 或负载均衡后，追加其 IP 段
    # set_real_ip_from 10.0.0.0/8;
    # set_real_ip_from 172.16.0.0/12;
    # set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ============================================
    # Gzip 压缩
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ============================================
    # 静态文件缓存（Next.js 构建产物）
    # ============================================
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # public 目录静态资源
    location /static/ {
        proxy_pass http://nextjs_app;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ============================================
    # 主代理配置（所有请求转发到 Next.js）
    # ============================================
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        # WebSocket 支持（Next.js 热更新/开发模式用，生产环境可选）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 标准转发头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        # 超时配置
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # 缓冲区配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ============================================
    # 安全响应头
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 可选：限制请求体大小
    client_max_body_size 10M;
}
